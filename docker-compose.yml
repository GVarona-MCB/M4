services:
  db:
    image: postgres:16
    container_name: vianda-db
    environment:
      POSTGRES_USER: vianda
      POSTGRES_PASSWORD: vianda
      POSTGRES_DB: vianda
    ports:
      # Host 5433 -> contenedor 5432 (no choca con n8n en 5432)
      - '5433:5432'
    volumes:
      - vianda-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vianda']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: vianda-api
    environment:
      DATABASE_URL: postgresql://vianda:vianda@db:5432/vianda?schema=public
      API_PORT: 3001
      APP_TIMEZONE: America/Argentina/Buenos_Aires
      SESSION_COOKIE_NAME: vianda_session
      SESSION_TTL_MINUTES: 15
      SESSION_ABSOLUTE_TTL_HOURS: 12
      SESSION_SECURE: 'false'
      WEB_ORIGIN: http://localhost:3002
      # SMTP: apunta a MailHog (captura los correos, no los envía de verdad).
      # Ver los correos enviados en http://localhost:8025
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_FROM: vianda@empresa.local
      # MailHog no hace TLS: requireTLS debe ir en false.
      SMTP_REQUIRE_TLS: 'false'
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started

  mailhog:
    # SMTP de prueba: captura los correos y los muestra en una web (no envía nada real).
    image: mailhog/mailhog
    container_name: vianda-mailhog
    ports:
      # 1025 = SMTP (interno, lo usa la API) · 8025 = interfaz web para ver los correos
      - '8025:8025'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    container_name: vianda-web
    ports:
      - '3002:3002'
    depends_on:
      - api

volumes:
  vianda-pgdata:
